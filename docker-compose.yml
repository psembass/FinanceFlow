services:
  postgres:
    image: postgres:15.17-alpine
    container_name: financeflow-postgres
    environment:
      POSTGRES_DB: financeflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
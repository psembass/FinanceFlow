spring:
  application:
    name: financeflow

  datasource:
    url: jdbc:postgresql://localhost:5432/financeflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.flywaydb: DEBUG

server:
  port: 8080